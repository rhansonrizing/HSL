  async function queryEquationPoints(segments, district = null) {
    const segClauses = segments.map(({ fromBest, toBest }) => {
      const fromM = Math.min(fromBest.measure, toBest.measure) - 0.005;
      const toM   = Math.max(fromBest.measure, toBest.measure) + 0.005;
      return `(routeId = '${fromBest.routeId}' AND fromMeasure >= ${fromM} AND fromMeasure <= ${toM})`;
    });

    const uniqueClauses  = [...new Set(segClauses)];
    const districtFilter = district != null ? ` AND District_Code = ${district}` : '';
    const where = uniqueClauses.length === 1
      ? uniqueClauses[0].slice(1, -1) + ' AND hslDescription IS NOT NULL AND LRSToDate IS NULL' + districtFilter
      : `(${uniqueClauses.join(' OR ')}) AND hslDescription IS NOT NULL AND LRSToDate IS NULL${districtFilter}`;

    const body = new URLSearchParams({
      where,
      outFields:      'OBJECTID,routeId,fromMeasure,District_Code,hslDescription,PMMeasure,PMPrefix,PMSuffix,ODMeasure,County',
      orderByFields:  'fromMeasure ASC',
      returnGeometry: 'false',
      ...versionParam(),
      f:              'json',
      token:          _token
    });

    let resp, data;
    try {
      resp = await fetch(`${CONFIG.mapServiceUrl}/305/query`, {
        method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString()
      });
      data = await resp.json();
    } catch (e) {
      console.error('[queryEquationPoints] error:', e.message);
      return [];
    }

    if (data.error) {
      const code = data.error.code;
      if (code === 498 || code === 499) { _token = null; login(); return []; }
      console.error(`[queryEquationPoints] API error ${code}: ${data.error.message}`);
      return [];
    }

    const features = data.features;
    if (!Array.isArray(features)) return [];

    // Group into pairs by routeId + fromMeasure rounded to 3 decimal places.
    // Sort each group by fromMeasure ASC so first = lower measure.
    const groups = new Map();
    for (const f of features) {
      const a = f.attributes ?? {};
      const routeNum = (a.routeId ?? '').match(/\d{3}/)?.[0] ?? a.routeId ?? '';
      const key = `${routeNum}_${Math.round((a.fromMeasure ?? 0) * 1000)}`;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(a);
    }

    const pairs = [];
    for (const [key, group] of groups.entries()) {
      group.sort((a, b) => (a.fromMeasure ?? 0) - (b.fromMeasure ?? 0));
      const first = group[0];
      const second = group[1] ?? null;

      pairs.push({
        type:        'equation',
        eqPairId:    key,
        name:        `eq1_${first.routeId}_${first.fromMeasure}`,
        desc:        first.hslDescription ?? '',
        routeId:     first.routeId,
        arMeasure:   first.fromMeasure,
        county:      first.County      ?? '',
        pmPrefix:    first.PMPrefix    ?? '',
        pmSuffix:    first.PMSuffix    ?? '.',
        pmMeasure:   first.PMMeasure   ?? '',
        odMeasure:   first.ODMeasure   != null ? String(first.ODMeasure) : '',
        district:    first.District_Code != null ? String(first.District_Code).padStart(2, '0') : '',
        isSecondEq:  false
      });

      if (second) {
        pairs.push({
          type:        'equation',
          eqPairId:    key,
          name:        `eq2_${second.routeId}_${second.fromMeasure}`,
          desc:        '',
          routeId:     second.routeId,
          arMeasure:   second.fromMeasure,
          county:      second.County      ?? '',
          pmPrefix:    second.PMPrefix    ?? '',
          pmSuffix:    'E',
          pmMeasure:   second.PMMeasure   ?? '',
          odMeasure:   second.ODMeasure   != null ? String(second.ODMeasure) : '',
          district:    second.District_Code != null ? String(second.District_Code).padStart(2, '0') : '',
          isSecondEq:  true
        });
      }
    }
    return pairs;
  }

  async function queryRampDescriptions(allPairs) {
    const rampsOnly = allPairs.filter(p => p.type === 'ramp');

    const fetchDescriptions = async () => {
      const descMap = new Map();
      if (rampsOnly.length === 0) return descMap;
      const CHUNK = 100;
      const chunks = [];
      for (let i = 0; i < rampsOnly.length; i += CHUNK) chunks.push(rampsOnly.slice(i, i + CHUNK));
      const allDescFeatures = (await Promise.all(chunks.map(async chunk => {
        const inList = chunk.map(p => `'${p.name.replace(/'/g, "''")}'`).join(', ');
        const body = new URLSearchParams({
          where:          `Ramp_Name IN (${inList})${getDateFilter()}`,
          outFields:      'Ramp_Name,Ramp_Description',
          returnGeometry: 'false',
          ...versionParam(),
          f:              'json',
          token:          _token
        });
        try {
          const resp = await fetch(`${CONFIG.mapServiceUrl}/131/query`, {
            method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString()
          });
          const data = await resp.json();
          if (data.error) {
            const code = data.error.code;
            if (code === 498 || code === 499) { _token = null; login(); return []; }
            console.error(`[queryRampDesc] API error ${code}: ${data.error.message}`);
            return [];
          }
          return Array.isArray(data.features) ? data.features : [];
        } catch (e) {
          console.error('[queryRampDesc] error:', e.message);
          return [];
        }
      }))).flat();
      for (const f of allDescFeatures) {
        const n = f.attributes?.Ramp_Name;
        const d = f.attributes?.Ramp_Description;
        if (n != null && !descMap.has(n)) descMap.set(n, d ?? '');
      }
      return descMap;
    };

    const [descMap, hwyMap, cityMap, odMap] = await Promise.all([
      fetchDescriptions(),
      queryRangeLayer(allPairs, 116, 'Highway_Group'),
      queryRangeLayer(allPairs, 74,  'City_Code'),
      translateToOD(allPairs)
    ]);

    const results = allPairs.map(p => ({
      name:        p.name,
      featureType: p.type === 'equation' ? 'H' : p.type === 'landmark' ? 'H' : p.type === 'routebreak' ? 'H' : p.type === 'intersection' ? 'I' : 'R',
      isCross:     p.isCross ?? false,
      isSecondEq:  p.isSecondEq ?? false,
      desc:        p.type === 'ramp' ? (descMap.get(p.name) ?? '') : p.desc,
      hwyGroup:    hwyMap.get(p.name)  ?? '',
      cityCode:    cityMap.get(p.name) ?? '',
      county:      p.county,
      district:    p.district ?? '',
      routeSuffix: p.routeSuffix,
      pmPrefix:    p.pmPrefix ?? '',
      pmSuffix:    p.pmSuffix ?? '.',
      pmMeasure:   p.pmMeasure,
      odMeasure:   odMap.get(p.name)   ?? '',
      startDate:   p.startDate,
      endDate:     p.endDate
    }));

    showRampResults('success', null, results);
  }

  // Returns a Map of name → OD measure.
  // OD measures are pre-populated on pairs that carry them (landmarks, equation points).
  // Types without an OD measure (ramps, intersections) will have an empty string.
  function translateToOD(allPairs) {
    return new Map(allPairs.map(p => [p.name, p.odMeasure ?? '']));
  }

  // Returns a Map of name → fieldName value for range-based event layers (e.g. 116, 74)
  // _S records fall back to _P routeId — layers 116/74 only carry _P alignments
  async function queryRangeLayer(pairs, layerNum, fieldName) {
    const CHUNK = 100;
    const chunks = [];
    for (let i = 0; i < pairs.length; i += CHUNK) chunks.push(pairs.slice(i, i + CHUNK));

    const allFeatures = (await Promise.all(chunks.map(async chunk => {
      const orClauses = chunk.map(p => {
        const rid = p.routeId.endsWith('_S') ? p.routeId.slice(0, -2) + '_P' : p.routeId;
        return `(RouteID = '${rid}' AND FromARMeasure <= ${p.arMeasure} AND ToARMeasure >= ${p.arMeasure})`;
      }).join(' OR ');
      const body = new URLSearchParams({
        where:          `(${orClauses})${getDateFilter()}`,
        outFields:      `RouteID,FromARMeasure,ToARMeasure,${fieldName}`,
        returnGeometry: 'false',
        ...versionParam(),
        f:              'json',
        token:          _token
      });
      try {
        const resp = await fetch(`${CONFIG.mapServiceUrl}/${layerNum}/query`, {
          method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString()
        });
        const data = await resp.json();
        if (data.error) {
          const code = data.error.code;
          if (code === 498 || code === 499) { _token = null; login(); }
          console.error(`[queryRangeLayer/${layerNum}] API error ${code}: ${data.error.message}`);
          return [];
        }
        return Array.isArray(data.features) ? data.features : [];
      } catch (e) {
        console.error(`[queryRangeLayer/${layerNum}] error:`, e.message);
        return [];
      }
    }))).flat();

    const byRoute = new Map();
    for (const f of allFeatures) {
      const rid = f.attributes?.RouteID;
      if (rid == null) continue;
      if (!byRoute.has(rid)) byRoute.set(rid, []);
      byRoute.get(rid).push(f);
    }
    const map = new Map();
    for (const p of pairs) {
      const lookupId   = p.routeId.endsWith('_S') ? p.routeId.slice(0, -2) + '_P' : p.routeId;
      const candidates = byRoute.get(lookupId) ?? [];
      const match = candidates.find(f => {
        const from = f.attributes?.FromARMeasure;
        const to   = f.attributes?.ToARMeasure;
        return from != null && to != null && p.arMeasure >= from && p.arMeasure <= to;
      });
      map.set(p.name, match?.attributes?.[fieldName] ?? '');
    }
    return map;
  }

  function showRampResults(type, message, names) {
    const box = document.getElementById('rampResults');
    box.style.display = 'block';

    if (type === 'error') {
      box.className = 'ramp-results error';
      box.innerHTML = esc(message);
    } else if (type === 'none') {
      box.className = 'ramp-results';
      box.innerHTML = `<span class="ramp-empty">No ramps found in this segment.</span>`;
    } else {
      _allResults  = names;
      _currentPage = 0;
      _generatedOn = new Date().toLocaleString();
      renderPage();
    }
  }

  // Returns an array of OD length strings indexed to results ('' when not computable)
  function computeLengths(results) {
    return results.map((p, i) => {
      if (p.isSecondEq) return '';
      const curOd = parseFloat(p.odMeasure);
      // Exclude second equation points from nextEntry candidates so eq point 1
      // measures distance to the next real record, not to its paired eq point 2.
      const rem = results.slice(i + 1).filter(r => !r.isSecondEq);
      let nextEntry;
      if (p.pmSuffix === 'R') {
        nextEntry = rem.find(r => r.featureType !== 'R' && r.featureType !== 'I' && r.pmSuffix !== 'L');
      } else if (p.pmSuffix === 'L') {
        nextEntry = rem.find(r => r.featureType !== 'R' && r.featureType !== 'I' && r.pmSuffix !== 'R');
      } else {
        const firstNR = rem.find(r => r.featureType !== 'R' && r.featureType !== 'I');
        nextEntry = (firstNR?.pmSuffix === 'R' || firstNR?.pmSuffix === 'L')
          ? rem.find(r => r.featureType !== 'R' && r.featureType !== 'I' && r.pmSuffix !== 'R' && r.pmSuffix !== 'L')
          : firstNR;
      }
      const nextOd = nextEntry ? parseFloat(nextEntry.odMeasure) : NaN;
      return (!isNaN(curOd) && !isNaN(nextOd)) ? (nextOd - curOd).toFixed(3) : '';
    });
  }

  // Renders a single result row as an HTML <li> string
  function renderItem(p, idx, lengths) {
    const length = lengths[idx];
    return `<li class="ramp-item ramp-col-template">
         <span>${p.district    ? esc(p.district)        : ''}</span>
         <span>${p.county      ? esc(String(p.county)) : ''}</span>
         <span>${p.cityCode    ? esc(p.cityCode)        : ''}</span>
         <span style="text-align:right;">${p.pmPrefix && p.pmPrefix !== '.' ? esc(p.pmPrefix) : ''}</span>
         <span style="text-align:center;">${esc(padMeasure(p.pmMeasure))}</span>
         <span style="justify-self:start;">${p.pmSuffix === 'E' ? 'E' : ''}</span>
         <span>${p.pmSuffix === 'L' ? 'L' : p.hwyGroup ? esc(p.hwyGroup) : ''}</span>
         <span>${p.featureType}</span>
         <span style="display:block;text-align:center;">${p.isCross ? '*P*' : p.featureType !== 'R' && p.featureType !== 'I' && length !== '' ? padMeasure(length) : ''}</span>
         <span>${p.desc        ? esc(p.desc)            : ''}</span>
       </li>`;
  }

  function renderPage() {
    const box       = document.getElementById('rampResults');
    box.style.display = 'block';
    box.className   = 'ramp-results';

    const totalPages = Math.ceil(_allResults.length / PAGE_SIZE);
    const page       = _currentPage;
    const start      = page * PAGE_SIZE;
    const pageSlice  = _allResults.slice(start, start + PAGE_SIZE);

    const prevDis = page === 0              ? 'disabled' : '';
    const nextDis = page === totalPages - 1 ? 'disabled' : '';

    const pagination =
      `<div class="report-action-bar">
         <button class="export-btn" onclick="exportToExcel()">Export</button>
         <div class="report-title">
           <div class="report-title-line1">California Department of Transportation</div>
           <div class="report-title-line2">Highway Locations</div>
           ${_routeLabel ? `<div class="report-title-line3">Route: ${esc(_routeLabel)}&emsp;&emsp;&emsp;Direction: ${esc(_directionFrom)} &ndash; ${esc(_directionTo)}</div>` : ''}
         </div>
         <button class="export-btn" onclick="printAll()">Print</button>
       </div>
       <div class="ramp-pagination">
         <div class="pagination-left">
           <div style="display:flex;">
             <button class="page-arrow" ${prevDis} onclick="changePageFirst()">&#9664;&#9664;</button>
             <button class="page-arrow" ${prevDis} onclick="changePage(-1)">&#9664;</button>
           </div>
         </div>
         <div class="pagination-right">
           <div style="display:flex;">
             <button class="page-arrow" ${nextDis} onclick="changePage(1)">&#9654;</button>
             <button class="page-arrow" ${nextDis} onclick="changePageLast()">&#9654;&#9654;</button>
           </div>
         </div>
       </div>`;

    const header =
      `<div class="ramp-list-header ramp-col-template">
         <span>Dist</span>
         <span>County</span>
         <span>City</span>
         <span></span>
         <span>PM</span>
         <span></span>
         <span>HG</span>
         <span>F</span>
         <span>DISTANCE TO<br>NEXT POINT</span>
         <span>Description</span>
       </div>`;

    const lengths  = computeLengths(_allResults);
    const items = pageSlice.map((p, i) => renderItem(p, start + i, lengths)).join('');

    const pageFooter = totalPages > 1
      ? `<div class="page-info">Page ${page + 1} of ${totalPages}</div>`
      : '';

    const generatedFooter = `<div class="generated-on">Generated on ${esc(_generatedOn)}</div>`;
    box.innerHTML = `${pagination}${header}<ul class="ramp-list">${items}</ul>${pageFooter}${generatedFooter}`;
  }

  function changePage(delta) {
    const totalPages = Math.ceil(_allResults.length / PAGE_SIZE);
    const next = _currentPage + delta;
    if (next < 0 || next >= totalPages) return;
    _currentPage = next;
    renderPage();
  }

  function changePageFirst() {
    if (_currentPage === 0) return;
    _currentPage = 0;
    renderPage();
  }

  function changePageLast() {
    const last = Math.ceil(_allResults.length / PAGE_SIZE) - 1;
    if (_currentPage === last) return;
    _currentPage = last;
    renderPage();
  }

  function printAll() {
    const box = document.getElementById('rampResults');
    const saved = box.innerHTML;

    const reportTitle =
      `<div class="report-action-bar">
         <div></div>
         <div class="report-title">
           <div class="report-title-line1">California Department of Transportation</div>
           <div class="report-title-line2">Highway Locations</div>
           ${_routeLabel ? `<div class="report-title-line3">Route: ${esc(_routeLabel)}&emsp;&emsp;&emsp;Direction: ${esc(_directionFrom)} &ndash; ${esc(_directionTo)}</div>` : ''}
         </div>
         <div></div>
       </div>`;

    const header =
      `<div class="ramp-list-header ramp-col-template">
         <span>Dist</span>
         <span>County</span>
         <span>City</span>
         <span></span>
         <span>PM</span>
         <span></span>
         <span>HG</span>
         <span>F</span>
         <span>DISTANCE TO<br>NEXT POINT</span>
         <span>Description</span>
       </div>`;

    const lengths  = computeLengths(_allResults);
    const items = _allResults.map((p, i) => renderItem(p, i, lengths)).join('');

    const generatedFooter = `<div class="generated-on">Generated on ${esc(_generatedOn)}</div>`;

    box.innerHTML = `${reportTitle}${header}<ul class="ramp-list">${items}</ul>${generatedFooter}`;
    window.addEventListener('afterprint', () => { box.innerHTML = saved; }, { once: true });
    window.print();
  }

  function exportToExcel() {
    if (_allResults.length === 0) return;

    const headers  = ['Dist', 'County', 'City', '', 'PM', '', 'HG', 'F', 'Distance To Next Point', 'Description'];
    const lengths  = computeLengths(_allResults);

    const rows = _allResults.map((p, i) => {
      const length = lengths[i];
      return [
        p.district    ?? '',
        p.county      ?? '',
        p.cityCode    ?? '',
        (p.pmPrefix && p.pmPrefix !== '.') ? p.pmPrefix : '',
        padMeasure(p.pmMeasure),
        p.pmSuffix === 'E' ? 'E' : '',
        p.pmSuffix === 'L' ? 'L' : (p.hwyGroup ?? ''),
        p.featureType ?? '',
        p.isCross ? '*P*' : p.featureType !== 'R' && p.featureType !== 'I' && length !== '' ? padMeasure(length) : '',
        p.desc        ?? ''
      ];
    });

    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Highway Locations');
    XLSX.writeFile(wb, 'highway_sequence_listing.xlsx');
  }

  function copyVal(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      setTimeout(() => btn.classList.remove('copied'), 1500);
    });
  }

  // Formats a numeric measure as NNN.NNN (3 digits each side of decimal)
  function padMeasure(val) {
    if (val === '' || val == null) return '';
    const num = parseFloat(val);
    if (isNaN(num)) return '';
    const [intPart, decPart] = num.toFixed(3).split('.');
    return intPart.padStart(3, '0') + '.' + decPart;
  }

  function esc(str) {
    return str
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function getDateFilter() {
    const val = document.getElementById('refDate').value; // "YYYY-MM-DD"
    if (!val || !/^\d{4}-\d{2}-\d{2}$/.test(val)) return '';
    const ts = `TIMESTAMP '${val} 00:00:00'`;
    return ` AND InventoryItemStartDate <= ${ts}` +
           ` AND (InventoryItemEndDate IS NULL OR InventoryItemEndDate > ${ts})`;
  }

  function getIntersectionDateFilter() {
    const val = document.getElementById('refDate').value;
    if (!val || !/^\d{4}-\d{2}-\d{2}$/.test(val)) return '';
    const ts = `TIMESTAMP '${val} 00:00:00'`;
    return ` AND Int_Geometry_Begin_Date <= ${ts}` +
           ` AND (Int_Geometry_End_Date IS NULL OR Int_Geometry_End_Date > ${ts})`;
  }

  // ── Bootstrap ─────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    // Default reference date to today
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('refDate').value = today;

    populateCounties();
    setupValidation();
    initAuth();
  });
</script>
</body>
